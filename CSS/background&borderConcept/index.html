<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>background concept</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        height: 100%;
      }
      body {
        width: 100%;
        height: 100%;
        /* image ki opacity(saturation kam = 0-1) kam nhi kar skte */
        /* content/div ki opacity kam kar skte hai  */
        background-image: url("https://wallpaperaccess.com/full/394383.jpg");
        background-repeat: no-repeat; /*y repeat,x repeat*/
        background-size: 50% 50%; /*250px(x)50px(y)*/
        background-position: center; /*y - ,x |*/
      }
    </style>
  </head>
  <body>
             <!--isko hum div lagaka kar sakte hai -->

    </p> -->
  </body>
</html>
