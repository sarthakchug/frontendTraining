 <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title> link concept</title>
  </head>
  <style> 
             /* #outline concept */
    span1{
        border: 1px solid black;
        outline: 1px solid black;
        outline-offset: 3px;
    } 
     a:link{
        color: blueviolet;
        background-color: brown;

     }
     a:visited{
        color: aqua;
        background-color: black;

     }
     a:hover{
        color: yellowgreen;

     }
     a:active{
        background-color: red;
        color: white;

     }
    a {
      /* color: #dbdbdb; */
      text-decoration: none;
    }
                                           /* # mandatory concept */
    div {
      width: 100%;
      /* border: 1px solid black; */
    }
    p {
      border: 1px solid black;
    }
  </style>
  <body>
    <span1>readmore</span1>
    <a href="https://ucstdoon.com/">Read more</a>
    <div>
      <p>Lorem ipsum <span style="font-size: 12px; color: red;">*</span> </p>
    </div>
  </body>
</html>
