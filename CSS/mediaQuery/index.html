<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>media concept</title>
    <style>
                                      /* phones - less then 600
                                        tab ke liye  - 601 to 992px
                                        desktop ke liye - 993 se higher */
        /* .maindiv{
            width: 400px;
            height: 300px;
            background-color: red;
        } */
                                          /* how to use */
      html {
        width: 100%;
        height: 100%;
      }
      .maindiv {
        display: flex;
        width: 100%;
      }
      .leftdiv {
        width: 50%;
      }
      .rightdiv {
        width: 50%;
      }
        @media (max-width:600px){
        .maindiv{
            flex-direction: column;
        }
        .leftdiv , .rightdiv{
            width: 100%;
        }
      }
    </style>
</head>
<body>
    <div class="maindiv">
        <div class="leftdiv"></div>
        <div class="rightdiv"></div>
    </div>

</body>
</html>
