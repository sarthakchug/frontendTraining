<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>whatspp animation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .maindiv{
            width: 32px;
            height: 32px;
            margin: 300px;
            border-radius: 50%;
            border: 1px solid green;
            /* background-color: green; */
            animation: whatspp 1s linear infinite;
        }
        div>i{
            color: rgb(37, 215, 160); 
            padding-top: 16px; 
            margin-left: 2px;  
        }
        @keyframes whatspp {
            from{
                transform: scale(0 , 0);
            }
            to{
                transform: scale(5 , 5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="maindiv">
        <div>
            <i class="fa-brands fa-whatsapp fa-2xl"></i>
        </div>
    </div>
</body>
</html>
