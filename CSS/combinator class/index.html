<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>comboinator concept</title>
    <style>
      /* " " , > , + , ~ */
      div p{
        color: red;
      }
      div>p{
         color: red;
      }
      div+p{
         color: red;
      }
      div~p{
        color: red;
      }
    </style>
  </head>
  <body>
    <div>
      <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Deserunt
        expedita doloribus, placeat ipsam magnam nihil voluptate velit nemo
        exercitationem eveniet illum consequatur aliquid vel suscipit, molestias
        sapiente voluptatibus omnis similique.
      </p>
    </div>
  </body>
</html>
