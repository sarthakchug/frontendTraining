<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transition</title>
    <style>
        p{
            width: 47px;
            height: 20px;
            border: 1px solid;
            background-color: red;
            padding: 5px 10px;
            /* transition: width , 0.5sec ease-in-out; */
            transition: all , 2s ease ;
            /* delay */
        }
        p:hover{
            background-color: orange;
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    <p>sarthak</p>
</body>
</html>
